# ============================================================
# TaskFlow - DEV Profile (H2 File-Based Database)
# Active when: spring.profiles.active=dev
#
# Changed from mem: to file: so data persists between restarts.
# Database file stored at: ./data/taskflowdb.mv.db
# ============================================================

# H2 File-Based Database (persists between restarts)
spring.datasource.url=jdbc:h2:file:./data/taskflowdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (access at http://localhost:8080/h2-console)
# Connection string to use: jdbc:h2:file:./data/taskflowdb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false