# ============================================================
# TaskFlow - Application Configuration
# Default profile: dev (H2 in-memory database)
# To switch to production: set SPRING_PROFILES_ACTIVE=prod
# ============================================================

spring.application.name=taskflow
spring.profiles.active=dev

# ============================================================
# JWT Configuration
# IMPORTANT: Change this secret in production!
# Minimum 256-bit (32 characters) for HS256 algorithm
# ============================================================
jwt.secret=taskflow-super-secret-key-change-this-in-production-min-32-chars
jwt.expiration=86400000

# ============================================================
# Server
# ============================================================
server.port=8080

# ============================================================
# Logging
# ============================================================
logging.level.com.taskflow=DEBUG
logging.level.org.springframework.security=INFO

# ============================================================
# Swagger / OpenAPI
# Access at: http://localhost:8080/swagger-ui.html
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method