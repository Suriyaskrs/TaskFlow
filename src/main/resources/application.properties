# ============================================================
# TaskFlow - Application Configuration
# Default profile: dev (H2 in-memory database)
# ============================================================

spring.application.name=taskflow
spring.profiles.active=dev

# ============================================================
# JWT Configuration
# ============================================================
jwt.secret=taskflow-super-secret-key-change-this-in-production-min-32-chars
jwt.expiration=86400000

# ============================================================
# Admin Secret
# Used to create admin accounts via POST /auth/register-admin
# CHANGE THIS in production — set via environment variable
# ============================================================
admin.secret=taskflow-admin-secret-2024

# ============================================================
# Server
# ============================================================
server.port=8080

# ============================================================
# Logging
# ============================================================
logging.level.com.taskflow=DEBUG
logging.level.org.springframework.security=INFO

# ============================================================
# Swagger / OpenAPI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method