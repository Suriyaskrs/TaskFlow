# ============================================================
# TaskFlow - PROD Profile (MySQL Database)
# Active when: spring.profiles.active=prod
#
# Set these environment variables before deploying:
#   DB_URL      → jdbc:mysql://your-host:3306/taskflow_db
#   DB_USERNAME → your_db_username
#   DB_PASSWORD → your_db_password
#   JWT_SECRET  → your_strong_secret_key (min 32 chars)
# ============================================================

# MySQL Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Override JWT secret from env in prod
jwt.secret=${JWT_SECRET}

# Disable H2 console in production
spring.h2.console.enabled=false